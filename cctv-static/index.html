<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surveillance Control Room - Astha Twin Towers</title>
  <!-- CSS assets -->
  <link rel="stylesheet" href="./css/styles.css">
  <!-- Tailwind CDN for fast premium preview styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              gold: '#D4AF37',
              darkAccent: '#0b1319'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center font-sans">
  
  <div class="w-full max-w-md p-6 sm:p-8 bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl relative overflow-hidden space-y-6">
    
    <!-- Top Decorative Line -->
    <div class="absolute top-0 left-0 right-0 h-1 bg-red-600 animate-pulse"></div>

    <div class="text-center space-y-2">
      <!-- Shield Indicator -->
      <div class="h-12 w-12 rounded-full bg-red-950 border border-red-500/30 flex items-center justify-center mx-auto mb-2 text-red-500">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-pulse"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <h1 class="text-lg font-black tracking-widest text-white uppercase font-mono">ASTHA NVR TERMINAL</h1>
      <p class="text-xs text-slate-400 font-mono tracking-tight">LIVE MONITORING GATEWAY SYSTEM</p>
    </div>

    <!-- Alert banner -->
    <div class="bg-amber-950/40 border border-amber-500/20 rounded-lg p-3 text-center">
      <p class="text-[10px] text-amber-500 font-mono leading-relaxed uppercase">
        🔐 Restricted Access: Authorised Personnel & Residents Overrides Only
      </p>
    </div>

    <!-- Form -->
    <form id="staticLoginForm" class="space-y-4">
      <div class="space-y-1">
        <label class="text-[10px] font-mono font-bold tracking-wider text-slate-400 uppercase block">User Security Key / Email</label>
        <input 
          type="email" 
          id="emailInput"
          required 
          placeholder="officer@astha-society.com" 
          class="w-full bg-slate-950 border border-slate-800 focus:border-red-500 focus:outline-none rounded-lg p-3 text-xs font-mono text-white"
        >
      </div>

      <div class="space-y-1">
        <label class="text-[10px] font-mono font-bold tracking-wider text-slate-400 uppercase block">Surveillance Access Pin</label>
        <input 
          type="password" 
          id="passwordInput"
          required 
          placeholder="••••••••" 
          class="w-full bg-slate-950 border border-slate-800 focus:border-red-500 focus:outline-none rounded-lg p-3 text-xs font-mono text-white"
        >
      </div>

      <div class="space-y-2 pt-2">
        <button 
          type="submit" 
          class="w-full bg-red-650 hover:bg-red-600 border border-red-500 text-white rounded-lg py-3 text-xs font-bold font-mono tracking-widest uppercase transition-all shadow-lg active:scale-[0.98] cursor-pointer"
        >
          AUTHENTICATE CONSOLE
        </button>

        <button 
          type="button" 
          id="googleLoginBtn"
          class="w-full bg-slate-950 hover:bg-slate-800 border border-slate-800 hover:border-slate-700 text-slate-300 rounded-lg py-3 text-xs font-bold font-mono tracking-widest uppercase transition-all flex items-center justify-center gap-2 cursor-pointer"
        >
          <svg class="h-4 w-4" viewBox="0 0 24 24">
            <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22c-.81-2.58-.81-5.18 0-7.79z"/>
            <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
          </svg>
          AUTHENTICATE WITH GOOGLE
        </button>
      </div>
    </form>

    <div class="flex justify-between items-center text-[10px] font-mono text-slate-500 pt-3 border-t border-slate-800">
      <span class="flex items-center gap-1.5 text-emerald-500">
        <span class="h-1.5 w-1.5 bg-emerald-500 rounded-full animate-ping"></span>
        NVR DISPATCH UP
      </span>
      <span>HTTPS DEPLOYED ONLY</span>
    </div>

  </div>

  <script type="module">
    import CONFIG from './config/config.js';
    
    // Quick static simulation login to simplify GitHub Pages testing
    const loginForm = document.getElementById('staticLoginForm');
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const email = document.getElementById('emailInput').value;
      const userObj = {
        email: email,
        name: email.split('@')[0].toUpperCase(),
        role: "Admin",
        uid: "static-guest-uid"
      };
      
      // Store user key in session
      localStorage.setItem('cctv_authenticated_user', JSON.stringify(userObj));
      // Redirect to camera console
      window.location.href = './pages/camera.html';
    });

    const googleBtn = document.getElementById('googleLoginBtn');
    googleBtn.addEventListener('click', () => {
      const userObj = {
        email: "officer@astha-society.com",
        name: "SOCIETY SECURITY",
        role: "Admin",
        uid: "static-google-uid"
      };
      localStorage.setItem('cctv_authenticated_user', JSON.stringify(userObj));
      window.location.href = './pages/camera.html';
    });
  </script>
</body>
</html>
